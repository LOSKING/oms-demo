<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMS 企业集成模拟器 - 开发者控制台</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ==========================================
         * 全局与色彩系统 (极客暗黑玻璃拟态)
         * ========================================== */
        :root {
            --bg-base: #0a0813;
            --bg-surface: rgba(20, 16, 38, 0.7);
            --bg-surface-solid: #141026;
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --secondary: #00f0ff;
            --secondary-glow: rgba(0, 240, 255, 0.3);
            --success: #39ff14;
            --success-glow: rgba(57, 255, 20, 0.3);
            --warning: #ffb700;
            --danger: #ff0055;
            --text-main: #f3f0ff;
            --text-muted: #a59fc4;
            --border-glow: rgba(255, 255, 255, 0.08);
            --font-main: 'Outfit', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: radial-gradient(circle at 50% 50%, #1a103c 0%, var(--bg-base) 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* ==========================================
         * 头部 & 导航
         * ========================================== */
        .header {
            background: rgba(10, 8, 19, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glow);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000;
            box-shadow: 0 0 15px var(--secondary-glow);
        }

        .logo-title h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-title span {
            font-size: 11px;
            color: var(--secondary);
            font-family: var(--font-mono);
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .nav-links a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-links a.active {
            color: var(--secondary);
            background: rgba(0, 240, 255, 0.08);
            border-color: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        /* ==========================================
         * 主体布局
         * ========================================== */
        .app-container {
            max-width: 1440px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }

        /* ==========================================
         * 侧边栏 (场景列表)
         * ========================================== */
        .sidebar {
            background: var(--bg-surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: calc(100vh - 120px);
            position: sticky;
            top: 90px;
        }

        .section-title {
            font-size: 13px;
            font-family: var(--font-mono);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }

        .scenario-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            flex: 1;
        }

        .scenario-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: left;
        }

        .scenario-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(4px);
        }

        .scenario-item.active {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.2), rgba(0, 240, 255, 0.1));
            border-color: var(--primary);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .scenario-id {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--secondary);
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }

        .scenario-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .scenario-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .control-panel {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ==========================================
         * 主工作区
         * ========================================== */
        .main-workarea {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 玻璃卡片 */
        .glass-card {
            background: var(--bg-surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 20px;
        }

        /* SVG 拓扑图 */
        .topology-container {
            position: relative;
            background: #0d0a1d;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        /* Stepper 控制 */
        .stepper-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stepper-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .stepper-progress {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--secondary);
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .steps-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .step-bubble {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .step-bubble.pending {
            opacity: 0.5;
        }

        .step-bubble.active {
            background: rgba(138, 43, 226, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.1);
            opacity: 1;
        }

        .step-bubble.completed {
            background: rgba(57, 255, 20, 0.04);
            border-color: rgba(57, 255, 20, 0.2);
            opacity: 1;
        }

        .step-num {
            font-family: var(--font-mono);
            font-size: 12px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
        }

        .step-bubble.active .step-num {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 0 8px var(--primary);
        }

        .step-bubble.completed .step-num {
            background: var(--success);
            border-color: var(--success);
            color: #000;
            box-shadow: 0 0 8px var(--success-glow);
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .step-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* ==========================================
         * 底部面板 (库存监控 & 日志控制台)
         * ========================================== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* 库存监控 */
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .stock-select-wh {
            background: #141026;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }

        .stock-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .stock-table th, .stock-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .stock-table th {
            color: var(--text-muted);
            font-weight: 500;
            background: rgba(255,255,255,0.02);
        }

        .stock-table td {
            color: #fff;
        }

        .stock-badge-composite {
            font-size: 10px;
            background: rgba(138, 43, 226, 0.15);
            color: #d8b4fe;
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid rgba(138, 43, 226, 0.3);
            margin-left: 5px;
        }

        .stock-badge-single {
            font-size: 10px;
            background: rgba(0, 240, 255, 0.1);
            color: #a5f3fc;
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            margin-left: 5px;
        }

        .stock-val {
            font-family: var(--font-mono);
            font-weight: 500;
        }

        .stock-change-flash {
            animation: flashGreen 1.5s ease-out;
        }

        .stock-change-flash-down {
            animation: flashRed 1.5s ease-out;
        }

        @keyframes flashGreen {
            0% { background-color: rgba(57, 255, 20, 0.2); color: var(--success); }
            100% { background-color: transparent; }
        }

        @keyframes flashRed {
            0% { background-color: rgba(255, 0, 85, 0.2); color: var(--danger); }
            100% { background-color: transparent; }
        }

        /* 日志控制台 */
        .terminal {
            background: #07050f;
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 320px;
        }

        .terminal-header {
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .terminal-dot-group {
            display: flex;
            gap: 6px;
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .td-red { background: #ff5f56; }
        .td-yellow { background: #ffbd2e; }
        .td-green { background: #27c93f; }

        .terminal-title {
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .terminal-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .terminal-line {
            line-height: 1.4;
            word-break: break-all;
        }

        .log-time { color: var(--text-muted); margin-right: 5px; }
        .log-tag { font-weight: 600; padding: 1px 4px; border-radius: 3px; font-size: 11px; margin-right: 5px; }
        .log-success { background: rgba(57, 255, 20, 0.1); color: var(--success); }
        .log-error { background: rgba(255, 0, 85, 0.1); color: var(--danger); }
        .log-sys { color: var(--secondary); font-weight: bold; }
        .log-payload {
            color: #d4d4d4;
            background: rgba(255,255,255,0.02);
            border-radius: 4px;
            padding: 8px;
            margin-top: 4px;
            display: block;
            white-space: pre-wrap;
            border-left: 2px solid var(--primary);
        }

        /* ==========================================
         * 按钮与交互
         * ========================================== */
        .btn-custom {
            font-family: var(--font-main);
            padding: 10px 18px;
            border: 1px solid transparent;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary), #b026ff);
            color: #fff;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-primary-custom:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.6);
        }

        .btn-secondary-custom {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-secondary-custom:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-accent-custom {
            background: transparent;
            border-color: var(--secondary);
            color: var(--secondary);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .btn-accent-custom:hover:not(:disabled) {
            background: rgba(0, 240, 255, 0.08);
            box-shadow: 0 0 15px var(--secondary-glow);
            transform: translateY(-2px);
        }

        .btn-custom:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ==========================================
         * SVG 拓扑图元素样式与动画
         * ========================================== */
        .svg-node {
            fill: #141026;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 1.5;
            rx: 6;
            ry: 6;
            transition: all 0.5s ease;
        }

        .svg-node.active {
            stroke: var(--secondary);
            fill: #19203e;
            filter: drop-shadow(0px 0px 8px var(--secondary-glow));
        }

        .svg-text {
            font-family: var(--font-main);
            font-size: 11px;
            font-weight: 500;
            fill: var(--text-muted);
            text-anchor: middle;
            pointer-events: none;
        }

        .svg-node.active + .svg-text {
            fill: #fff;
            font-weight: 600;
        }

        .svg-link {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 2;
            stroke-dasharray: 6 4;
            transition: all 0.5s ease;
        }

        .svg-link.active {
            stroke: var(--primary);
            stroke-width: 3;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -20;
            }
        }

        /* 拓扑背景图纸网格 */
        .svg-grid {
            fill: none;
            stroke: rgba(255, 255, 255, 0.02);
            stroke-width: 0.5;
        }
    </style>
</head>
<body>

    <!-- 顶部导航栏 -->
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">C</div>
            <div class="logo-title">
                <h1>OMS 企业集成模拟器</h1>
                <span>Enterprise Integration Sandbox</span>
            </div>
        </div>
        <div class="nav-links">
            <a href="/index.html">订单管理</a>
            <a href="/users.html">用户管理</a>
            <a href="/simulator.html" class="active">系统模拟器</a>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="app-container">
        
        <!-- 侧边栏: 场景列表 -->
        <div class="sidebar">
            <div class="section-title">模拟业务场景</div>
            <div class="scenario-list" id="scenarioList">
                <!-- 动态填充 -->
            </div>
            
            <div class="control-panel">
                <button class="btn-custom btn-accent-custom" onclick="resetSimulatorData()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                    初始化 / 重置数据
                </button>
            </div>
        </div>

        <!-- 主工作区 -->
        <div class="main-workarea">

            <!-- 1. SVG 架构网络拓扑图 -->
            <div class="topology-container">
                <svg width="100%" height="240" viewBox="0 0 800 240">
                    <!-- 背景网格纸 -->
                    <defs>
                        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
                        </pattern>
                        <filter id="glow-primary">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#grid)" />

                    <!-- 系统连接物理线路 -->
                    <!-- Core <-> open-OMS -->
                    <path id="path-core-oms" class="svg-link" d="M 120 75 L 400 120" />
                    <!-- SRM <-> open-OMS -->
                    <path id="path-srm-oms" class="svg-link" d="M 680 75 L 400 120" />
                    <!-- open-OMS <-> WMS -->
                    <path id="path-oms-wms" class="svg-link" d="M 400 120 L 680 165" />
                    <!-- open-OMS <-> POS -->
                    <path id="path-oms-pos" class="svg-link" d="M 400 120 L 120 165" />
                    <!-- open-OMS <-> FINANCE -->
                    <path id="path-oms-finance" class="svg-link" d="M 400 120 L 400 190" />
                    <!-- SRM <-> WMS -->
                    <path id="path-srm-wms" class="svg-link" d="M 680 75 L 680 165" />

                    <!-- 系统节点 -->
                    <!-- 自营渠道 (自营商城小程序等) -->
                    <rect id="node-core" class="svg-node" x="50" y="30" width="140" height="45" />
                    <text class="svg-text" x="120" y="56">自营小程序 / 核心自渠</text>

                    <!-- SRM 供应商管理系统 -->
                    <rect id="node-srm" class="svg-node" x="610" y="30" width="140" height="45" />
                    <text class="svg-text" x="680" y="56">SRM 供应链平台</text>

                    <!-- open-OMS/open-ERP 业务中台 (中央大脑) -->
                    <rect id="node-oms" class="svg-node" x="320" y="98" width="160" height="45" style="stroke: var(--primary); filter: drop-shadow(0 0 5px var(--primary-glow));" />
                    <text class="svg-text" x="400" y="124" style="fill: #fff; font-weight: 600;">open-OMS OMS 业务中台</text>

                    <!-- 顺丰 WMS 物理仓储系统 -->
                    <rect id="node-wms" class="svg-node" x="610" y="165" width="140" height="45" />
                    <text class="svg-text" x="680" y="191">顺丰 WMS 物流仓</text>

                    <!-- 门店 POS 终端系统 -->
                    <rect id="node-pos" class="svg-node" x="50" y="165" width="140" height="45" />
                    <text class="svg-text" x="120" y="191">门店 POS 终端</text>

                    <!-- 财务合同/账管系统 -->
                    <rect id="node-finance" class="svg-node" x="320" y="190" width="160" height="36" />
                    <text class="svg-text" x="400" y="212">财务合同/核算系统</text>
                </svg>
            </div>

            <!-- 2. 场景控制台 / 步骤条 -->
            <div class="glass-card">
                <div class="stepper-header">
                    <div class="stepper-title" id="activeScenarioName">请选择左侧模拟场景</div>
                    <div class="stepper-progress" id="stepIndicator">Step 0/0</div>
                </div>

                <div class="steps-container" id="stepsList">
                    <div style="color: var(--text-muted); font-size: 14px; text-align: center; padding: 20px;">
                        选择左侧列表中的场景，并点击“下一步”进行步骤级模拟调试。
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button class="btn-custom btn-secondary-custom" id="btnRestart" onclick="restartScenario()" disabled>重新开始</button>
                    <button class="btn-custom btn-primary-custom" id="btnNext" onclick="executeNextStep()" disabled>
                        <span>下一步</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </button>
                </div>
            </div>

            <!-- 3. 数据监控与输出终端 -->
            <div class="dashboard-grid">
                
                <!-- 实时多仓库存盘点 -->
                <div class="glass-card">
                    <div class="stock-header">
                        <div class="stepper-title">多仓实时库存监控</div>
                        <select class="stock-select-wh" id="stockWhSelector" onchange="loadStockData()">
                            <option value="WH_POS_STORE">OMS自营零售门店仓 (POS)</option>
                            <option value="WH_WMS_SF">顺丰物理仓 (WMS)</option>
                            <option value="WH_open-OMS_CENTRAL">集团中央仓 (open-OMS)</option>
                            <option value="WH_POS_STORE_B">OMS加盟零售门店仓 (POS)</option>
                        </select>
                    </div>
                    <div style="max-height: 250px; overflow-y: auto;">
                        <table class="stock-table">
                            <thead>
                                <tr>
                                    <th>商品编码</th>
                                    <th>商品名称</th>
                                    <th>类型</th>
                                    <th>当前库存</th>
                                    <th>单位</th>
                                </tr>
                            </thead>
                            <tbody id="stockTableBody">
                                <!-- 动态数据 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- API 接口交互日志控制台 -->
                <div class="terminal">
                    <div class="terminal-header">
                        <div class="terminal-dot-group">
                            <div class="terminal-dot td-red"></div>
                            <div class="terminal-dot td-yellow"></div>
                            <div class="terminal-dot td-green"></div>
                        </div>
                        <div class="terminal-title">api integration log terminal</div>
                    </div>
                    <div class="terminal-body" id="terminalBody"></div>
                </div>

            </div> <!-- End of .dashboard-grid -->
        </div> <!-- End of .main-workarea -->
    </div> <!-- End of .app-container -->

    <script>
        // ==========================================
        // 场景元数据定义
        // ==========================================
        const SCENARIOS = [
            {
                id: 1,
                name: "B2B 采购直发 WMS 流程",
                desc: "采购订单由中台推送SRM完成发货，自动推送WMS入库并同步回传",
                steps: [
                    { title: "创建采购订单", desc: "open-OMS中台发起向供应商采购智能 5G 手机的需求，创建PO-2026-0001订单并推送到SRM系统", systems: ["oms", "srm"], paths: ["path-srm-oms"] },
                    { title: "供应商确认并推入库", desc: "供应商在SRM发货，自动回传中台生成采购单PB与入库单IN，并通过三方接口推送顺丰WMS", systems: ["srm", "oms", "wms"], paths: ["path-srm-oms", "path-oms-wms"] },
                    { title: "WMS收货与上架确认", desc: "顺丰WMS完成入库，回传OMS入库确认。OMS自动增加WMS仓对应库存，归档采购单", systems: ["wms", "oms"], paths: ["path-oms-wms"] }
                ]
            },
            {
                id: 2,
                name: "三方供应链采购与财务协同",
                desc: "SRM汇总需求，供应商发货进WMS。入库回传同步结算，触发财务应收付生成",
                steps: [
                    { title: "提报需求汇总PO", desc: "门店在SRM提报潮流休闲卫衣采购需求，系统自动汇总并向中台推送总部采购订单PO-2026-0002", systems: ["srm", "oms"], paths: ["path-srm-oms"] },
                    { title: "供应商发货与下发WMS", desc: "供应商在SRM发货，推送中台生成采购单PB并推送顺丰WMS生成待入库单", systems: ["srm", "oms", "wms"], paths: ["path-srm-oms", "path-oms-wms"] },
                    { title: "入库完成与财务往来记账", desc: "WMS入库上架回传。中台同步数据到SRM，SRM生成应付单推送财务合同系统记账", systems: ["wms", "oms", "srm", "finance"], paths: ["path-oms-wms", "path-srm-oms", "path-oms-finance"] }
                ]
            },
            {
                id: 3,
                name: "直营店向总部采购流程",
                desc: "门店向总部发起内部采购，触发总部销售发货、WMS出库以及门店采购与入库的级联自动生成",
                steps: [
                    { title: "门店申请与自动销售审核", desc: "门店在SRM提报纯棉床上用品四件套(组合装)需求，推送中台自动生成门店PO，并关联生成总部销售订单(SO)自动审核", systems: ["srm", "oms"], paths: ["path-srm-oms"] },
                    { title: "发货出库下发WMS", desc: "中台生成销售单并派发顺丰WMS配货，产生出库单并利用三方接口进行推送", systems: ["oms", "wms"], paths: ["path-oms-wms"] },
                    { title: "WMS出库回传与级联入库", desc: "WMS出库回传，OMS扣除WMS库存，级联生成门店PB与入库单，门店一键入库后产生财务调拨账", systems: ["wms", "oms", "pos", "finance"], paths: ["path-oms-wms", "path-oms-pos", "path-oms-finance"] }
                ]
            },
            {
                id: 4,
                name: "门店之间调拨业务",
                desc: "直营店A调出商品到加盟店B，中台产生协同订单。调出即扣库，调入一键确认入库，两端对接财务调拨",
                steps: [
                    { title: "发起调拨扣减库存", desc: "调出店A在POS端录入调拨单调出智能 5G 手机10台，中台协同生成CO协同订单并审核，扣除A店库存", systems: ["pos", "oms"], paths: ["path-oms-pos"] },
                    { title: "财务调拨账单预记", desc: "中台自动将调拨出库完成的状态推送到财务合同系统的‘商品调拨单’进行调账", systems: ["oms", "finance"], paths: ["path-oms-finance"] },
                    { title: "调入店确认与流程关闭", desc: "调入店B到货后在POS端一键入库，增加B店库存，中台完结所有单据，并推送财务关闭账期", systems: ["pos", "oms", "finance"], paths: ["path-oms-pos", "path-oms-finance"] }
                ]
            },
            {
                id: 5,
                name: "自渠订单取货与BOM拆解",
                desc: "线上付款单推中台，到店自提触发BOM配方自动扣减原料库存。线上退款启动逆向拆卸恢复",
                steps: [
                    { title: "付款自提单推中台", desc: "自营渠道(美团/小程序)已付款四件套自提订单推送到中台自提池，订单状态为‘已审核’", systems: ["core", "oms"], paths: ["path-core-oms"] },
                    { title: "核销自提与BOM原料扣库存", desc: "到店POS扫码核销取货。系统触发BOM拆解引擎：根据1套四件套配比，扣减门店仓面料、绣线、辅料库存", systems: ["pos", "oms"], paths: ["path-oms-pos"] },
                    { title: "自渠退货退款与BOM复原", desc: "小程序申请退款。中台作废订单产生退货单，触发BOM复原引擎，反向将面料等原料库存全额归还门店仓", systems: ["core", "oms"], paths: ["path-core-oms", "path-oms-pos"] }
                ]
            },
            {
                id: 6,
                name: "门店智能盘点业务",
                desc: "店长提交盘点。open-OMS中台根据商品属性，自动剔除无需盘点的组合品与零库存品。生成盘盈盘亏表",
                steps: [
                    { title: "创建盘点与商品过滤", desc: "店长张三创建门店月盘任务。中台自动剔除组装属性为是的复合品(四件套)，下发真实物料明细", systems: ["pos", "oms"], paths: ["path-oms-pos"] },
                    { title: "录入实盘保存差异", desc: "录入实盘数(全棉面料盘亏2m, 包装辅料盘盈1pcs)并保存。中台实时计算差异并展示盘点盈亏预览", systems: ["pos", "oms"], paths: ["path-oms-pos"] },
                    { title: "审批完成并核销库存", desc: "店长最终确认审批。中台调整门店仓库存，生成最终的‘盘盈盘亏差异调整单’记录", systems: ["pos", "oms"], paths: ["path-oms-pos"] }
                ]
            }
        ];

        // ==========================================
        // 全局状态管理
        // ==========================================
        let activeScenario = null;
        let activeStep = 0;
        let localStocks = [];

        // ==========================================
        // 页面初始化
        // ==========================================
        document.addEventListener("DOMContentLoaded", function() {
            // 初始化渲染场景列表
            renderScenarios();
            // 加载实时库存
            loadStockData();
        });

        function renderScenarios() {
            const list = document.getElementById("scenarioList");
            list.innerHTML = "";
            SCENARIOS.forEach(sc => {
                const el = document.createElement("div");
                el.className = "scenario-item";
                el.id = `scenario-card-${sc.id}`;
                el.onclick = () => selectScenario(sc.id);
                el.innerHTML = `
                    <span class="scenario-id">SCENARIO 0${sc.id}</span>
                    <div class="scenario-name">${sc.name}</div>
                    <div class="scenario-desc">${sc.desc}</div>
                `;
                list.appendChild(el);
            });
        }

        // 选择场景
        function selectScenario(id) {
            // 清理高亮样式
            document.querySelectorAll(".scenario-item").forEach(item => item.classList.remove("active"));
            document.getElementById(`scenario-card-${id}`).classList.add("active");

            activeScenario = SCENARIOS.find(sc => sc.id === id);
            activeStep = 0;

            document.getElementById("activeScenarioName").innerText = activeScenario.name;
            document.getElementById("stepIndicator").innerText = `Step 0/${activeScenario.steps.length}`;

            // 渲染步骤条
            renderSteps();
            // 重置拓扑图高亮
            resetTopologyHighlight();

            // 激活控制按钮
            document.getElementById("btnRestart").disabled = false;
            document.getElementById("btnNext").disabled = false;
            
            // 清理终端，并写入启动行
            clearTerminal();
            printTerminalLog("SYS", `场景 [${activeScenario.name}] 已加载，点击 '下一步' 开始执行 Step 1.`, "log-sys");
        }

        // 渲染步骤条
        function renderSteps() {
            const stepsList = document.getElementById("stepsList");
            stepsList.innerHTML = "";
            activeScenario.steps.forEach((step, index) => {
                const stepNum = index + 1;
                const bubble = document.createElement("div");
                bubble.className = "step-bubble pending";
                bubble.id = `step-bubble-${stepNum}`;
                bubble.innerHTML = `
                    <div class="step-num">${stepNum}</div>
                    <div class="step-content">
                        <div class="step-title">${step.title}</div>
                        <div class="step-desc">${step.desc}</div>
                    </div>
                `;
                stepsList.appendChild(bubble);
            });
        }

        // 重置拓扑高亮
        function resetTopologyHighlight() {
            document.querySelectorAll(".svg-node").forEach(node => node.classList.remove("active"));
            document.querySelectorAll(".svg-link").forEach(link => link.classList.remove("active"));
        }

        // 高亮活跃拓扑节点与线路
        function highlightTopology(systems, paths) {
            resetTopologyHighlight();
            if (systems) {
                systems.forEach(sys => {
                    const node = document.getElementById(`node-${sys}`);
                    if (node) node.classList.add("active");
                });
            }
            if (paths) {
                paths.forEach(pathId => {
                    const path = document.getElementById(pathId);
                    if (path) path.classList.add("active");
                });
            }
        }

        // ==========================================
        // 核心 API 交互
        // ==========================================

        // 下一步执行
        function executeNextStep() {
            if (!activeScenario) return;
            if (activeStep >= activeScenario.steps.length) {
                printTerminalLog("SYS", "场景已全部执行完毕。你可以点击 '重新开始' 或选择其他场景。", "log-sys");
                return;
            }

            activeStep++;
            document.getElementById("stepIndicator").innerText = `Step ${activeStep}/${activeScenario.steps.length}`;

            // 更新步骤条UI
            for (let i = 1; i <= activeScenario.steps.length; i++) {
                const bubble = document.getElementById(`step-bubble-${i}`);
                if (i < activeStep) {
                    bubble.className = "step-bubble completed";
                } else if (i === activeStep) {
                    bubble.className = "step-bubble active";
                    bubble.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    bubble.className = "step-bubble pending";
                }
            }

            // 高亮对应拓扑
            const currentStepDef = activeScenario.steps[activeStep - 1];
            highlightTopology(currentStepDef.systems, currentStepDef.paths);

            // 发送请求给后端运行步骤
            fetch("/api/simulator/run", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ scenarioId: activeScenario.id, step: activeStep })
            })
            .then(res => res.json())
            .then(res => {
                if (res.success && res.data) {
                    // 输出回显日志
                    res.data.forEach(logEntry => {
                        printIntegrationLog(logEntry);
                    });
                    // 重新拉取库存，触发对比动画
                    loadStockData();
                } else {
                    printTerminalLog("ERR", "步骤运行失败: " + res.message, "log-error");
                }
            })
            .catch(err => {
                printTerminalLog("ERR", "请求失败: " + err, "log-error");
            });

            // 如果是最后一步，禁用下一步按钮
            if (activeStep === activeScenario.steps.length) {
                document.getElementById("btnNext").disabled = true;
            }
        }

        // 重新启动该场景
        function restartScenario() {
            if (!activeScenario) return;
            selectScenario(activeScenario.id);
        }

        // 初始化/重置数据
        function resetSimulatorData() {
            if (confirm("这会清空模拟器生成的所有库存、日志和订单。确定要重置吗？")) {
                printTerminalLog("SYS", "正在向中台发送数据初始化请求...", "log-sys");
                fetch("/api/simulator/reset", { method: "POST" })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        printTerminalLog("SUCCESS", "中台回复: " + res.message, "log-success");
                        loadStockData();
                        if (activeScenario) {
                            selectScenario(activeScenario.id);
                        }
                    } else {
                        printTerminalLog("ERR", "重置失败: " + res.message, "log-error");
                    }
                })
                .catch(err => {
                    printTerminalLog("ERR", "请求异常: " + err, "log-error");
                });
            }
        }

        // 加载实时库存数据
        function loadStockData() {
            fetch("/api/simulator/stocks")
            .then(res => res.json())
            .then(res => {
                if (res.success && res.data) {
                    const newStocks = res.data;
                    renderStockTable(newStocks);
                    // 保存新数据
                    localStocks = newStocks;
                }
            });
        }

        // 渲染库存表格
        function renderStockTable(newStocks) {
            const wh = document.getElementById("stockWhSelector").value;
            const tbody = document.getElementById("stockTableBody");
            tbody.innerHTML = "";

            // 过滤选中仓库的库存
            const whStocks = newStocks.filter(s => s.warehouseCode === wh);
            
            // 商品名称映射定义 (前端只读呈现)
            const pMap = {
                "P001": { name: "全棉四件套面料", type: "SINGLE", label: "单品" },
                "P002": { name: "枕套穿缝绣线", type: "SINGLE", label: "单品" },
                "P003": { name: "拉链及包装辅料", type: "SINGLE", label: "单品" },
                "P004": { name: "纯棉床上用品四件套(组合装)", type: "COMPOSITE", label: "复合" },
                "P005": { name: "智能 5G 手机", type: "SINGLE", label: "单品" },
                "P006": { name: "潮流休闲卫衣", type: "SINGLE", label: "单品" }
            };

            whStocks.sort((a, b) => a.productCode.localeCompare(b.productCode)).forEach(s => {
                const info = pMap[s.productCode] || { name: "未知商品", type: "SINGLE", label: "未知" };
                const badgeClass = info.type === "COMPOSITE" ? "stock-badge-composite" : "stock-badge-single";
                const unitMap = {
                    "P001": "m",
                    "P002": "axis",
                    "P003": "pcs",
                    "P004": "set",
                    "P005": "unit",
                    "P006": "pcs"
                };
                const unit = unitMap[s.productCode] || "pcs";

                // 检查与旧库存数据对比，若有变化执行动画高亮
                let diffClass = "";
                const oldVal = localStocks.find(oldS => oldS.warehouseCode === s.warehouseCode && oldS.productCode === s.productCode);
                if (oldVal) {
                    const valDiff = parseFloat(s.quantity) - parseFloat(oldVal.quantity);
                    if (valDiff > 0) {
                        diffClass = "stock-change-flash";
                    } else if (valDiff < 0) {
                        diffClass = "stock-change-flash-down";
                    }
                }

                const tr = document.createElement("tr");
                tr.className = diffClass;
                tr.innerHTML = `
                    <td class="stock-val">${s.productCode}</td>
                    <td>${info.name}<span class="${badgeClass}">${info.label}</span></td>
                    <td>${info.type}</td>
                    <td class="stock-val" style="font-weight:600; color:${info.type === 'COMPOSITE'?'#e8b4fe':'#00f0ff'};">${parseFloat(s.quantity).toFixed(2)}</td>
                    <td>${unit}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ==========================================
        // 终端日志打印
        // ==========================================
        function clearTerminal() {
            document.getElementById("terminalBody").innerHTML = "";
        }

        function printTerminalLog(tag, message, tagClass) {
            const body = document.getElementById("terminalBody");
            const timeStr = new Date().toLocaleTimeString();
            const el = document.createElement("div");
            el.className = "terminal-line";
            el.innerHTML = `
                <span class="log-time">[${timeStr}]</span>
                <span class="log-tag ${tagClass}">${tag}</span>
                <span>${message}</span>
            `;
            body.appendChild(el);
            body.scrollTop = body.scrollHeight;
        }

        function printIntegrationLog(logEntry) {
            const body = document.getElementById("terminalBody");
            const timeStr = new Date(logEntry.timestamp).toLocaleTimeString();
            const tagClass = logEntry.status === "SUCCESS" ? "log-success" : "log-error";
            const tag = logEntry.status === "SUCCESS" ? "OK" : "FAIL";

            const el = document.createElement("div");
            el.className = "terminal-line";
            
            let payloadHtml = "";
            if (logEntry.payload) {
                try {
                    const obj = JSON.parse(logEntry.payload);
                    const pretty = JSON.stringify(obj, null, 2);
                    payloadHtml = `<code class="log-payload">${pretty}</code>`;
                } catch(e) {
                    payloadHtml = `<code class="log-payload">${logEntry.payload}</code>`;
                }
            }

            el.innerHTML = `
                <span class="log-time">[${timeStr}]</span>
                <span class="log-tag ${tagClass}">${tag}</span>
                <span style="color:#d4d4d4;"><span style="color:var(--secondary); font-weight:600;">${logEntry.sender}</span> ➔ <span style="color:var(--secondary); font-weight:600;">${logEntry.receiver}</span> | 接口: <span style="color:#ce9178;">${logEntry.interfaceName}</span></span>
                <div style="color:var(--text-muted); margin-left:20px; font-size:11px; margin-top:2px;">ℹ ${logEntry.message}</div>
                ${payloadHtml}
            `;
            body.appendChild(el);
            body.scrollTop = body.scrollHeight;
        }
    </script>
</body>
</html>
